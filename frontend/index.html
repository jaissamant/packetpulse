<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PacketPulse 🌐</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div>
    <span class="logo-text">Packet<span>Pulse</span> 🌐</span>
    <span class="logo-badge">LIVE</span>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot live" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
    <button class="btn" id="btn-pause">⏸ Pause</button>
    <button class="btn danger" id="btn-clear">✕ Clear</button>
  </div>
</header>

<!-- ── Stat Cards ── -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Total Packets</div>
    <div class="stat-value c-blue" id="stat-total">0</div>
    <div class="stat-sub">captured</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Data Transferred</div>
    <div class="stat-value c-green" id="stat-bytes">0 B</div>
    <div class="stat-sub">total bytes</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Packets / sec</div>
    <div class="stat-value c-amber" id="stat-pps">0.0</div>
    <div class="stat-sub">live rate</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Top Protocol</div>
    <div class="stat-value c-purple" id="stat-proto">—</div>
    <div class="stat-sub">most traffic</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Protocols Seen</div>
    <div class="stat-value c-red" id="stat-conns">0</div>
    <div class="stat-sub">unique types</div>
  </div>
</div>

<!-- ── Filter Bar ── -->
<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active"  data-filter="ALL">ALL</button>
  <button class="filter-btn f-tcp"   data-filter="TCP">TCP</button>
  <button class="filter-btn f-udp"   data-filter="UDP">UDP</button>
  <button class="filter-btn f-icmp"  data-filter="ICMP">ICMP</button>
  <button class="filter-btn"         data-filter="DNS">DNS</button>
  <button class="filter-btn"         data-filter="ARP">ARP</button>
  <input  class="search-input" id="search-input" placeholder="🔍  Search IP, protocol..."/>
  <span   class="packet-count" id="packet-count">0 packets</span>
</div>

<!-- ── Packet Table ── -->
<div class="table-wrap" id="table-wrap">
  <table>
    <colgroup>
      <col style="width:76px">
      <col style="width:74px">
      <col style="width:22%">
      <col style="width:24px">
      <col style="width:22%">
      <col style="width:64px">
      <col style="width:110px">
      <col>
    </colgroup>
    <thead>
      <tr>
        <th>Time</th>
        <th>Proto</th>
        <th>Source</th>
        <th></th>
        <th>Destination</th>
        <th>Size</th>
        <th>Flags</th>
        <th>Service</th>
      </tr>
    </thead>
    <tbody id="packet-table"></tbody>
  </table>
</div>

<!-- ── Pause Banner ── -->
<div class="pause-banner" id="pause-banner">⏸ Paused — new packets buffered</div>

<!-- ── Toast Notifications ── -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ── Scripts (order matters) ── -->
<script src="/js/socket.js"></script>
<script src="/js/stats.js"></script>
<script src="/js/table.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
